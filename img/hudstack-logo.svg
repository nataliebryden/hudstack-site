<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 72" width="64" height="72" fill="none">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2EC4B6"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#FF3CAC"/>
    </linearGradient>
    <linearGradient id="grad-dim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2EC4B6" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF3CAC" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Back shadow shield (offset for depth) -->
  <path d="M34 4 L58 18 V44 C58 54 46 64 34 68 C22 64 10 54 10 44 V18 Z"
        fill="url(#grad-dim)" stroke="none"/>

  <!-- Main shield fill -->
  <path d="M32 2 L56 16 V42 C56 52 44 62 32 66 C20 62 8 52 8 42 V16 Z"
        fill="#0A0E1A"/>

  <!-- Main shield border (thick gradient) -->
  <path d="M32 2 L56 16 V42 C56 52 44 62 32 66 C20 62 8 52 8 42 V16 Z"
        fill="none" stroke="url(#grad)" stroke-width="8"/>

  <!-- Inner shield border (thinner, inset) -->
  <path d="M32 8 L50 19 V40 C50 48 41 56 32 59 C23 56 14 48 14 40 V19 Z"
        fill="none" stroke="url(#grad)" stroke-width="0.8" opacity="0.5"/>

  <!-- H letter (drawn as paths for bold, geometric look) -->
  <!-- Left vertical bar -->
  <rect x="21" y="22" width="6" height="24" rx="1" fill="#2EC4B6"/>
  <!-- Right vertical bar -->
  <rect x="37" y="22" width="6" height="24" rx="1" fill="#2EC4B6"/>
  <!-- Horizontal crossbar -->
  <rect x="21" y="31" width="22" height="6" rx="1" fill="#2EC4B6"/>

  <!-- Small accent ticks (tech detail) -->
  <line x1="5" y1="20" x2="8" y2="20" stroke="#2EC4B6" stroke-width="0.8" opacity="0.4"/>
  <line x1="5" y1="24" x2="7" y2="24" stroke="#2EC4B6" stroke-width="0.6" opacity="0.3"/>
  <line x1="56" y1="44" x2="59" y2="44" stroke="#FF3CAC" stroke-width="0.8" opacity="0.4"/>
  <line x1="57" y1="48" x2="59" y2="48" stroke="#FF3CAC" stroke-width="0.6" opacity="0.3"/>
</svg>

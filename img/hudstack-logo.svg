<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="shield-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2EC4B6"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#FF3CAC"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: Depth/shadow offset behind main shield -->
  <path d="M17 7 L51 7 L56 12 L56 40 L34 62 L12 40 L12 12 Z"
        fill="rgba(46, 196, 182, 0.12)"/>

  <!-- Layer 2: Main shield — dark fill, gradient border -->
  <path d="M15 5 L49 5 L54 10 L54 38 L32 60 L10 38 L10 10 Z"
        fill="#0A0F1A"
        stroke="url(#shield-grad)"
        stroke-width="3"
        stroke-linejoin="miter"/>

  <!-- Inner border accent (layered depth) -->
  <path d="M17 8 L47 8 L51 12 L51 36 L32 56 L13 36 L13 12 Z"
        fill="none"
        stroke="url(#shield-grad)"
        stroke-width="1"
        stroke-linejoin="miter"
        opacity="0.4"/>

  <!-- Layer 3: H letterform — bold, filled, teal -->
  <rect x="20" y="19" width="6.5" height="26" rx="1" fill="#2EC4B6"/>
  <rect x="37.5" y="19" width="6.5" height="26" rx="1" fill="#2EC4B6"/>
  <rect x="20" y="29" width="24" height="7" rx="1" fill="#2EC4B6"/>

  <!-- Tech accent ticks — top left -->
  <line x1="3" y1="16" x2="8.5" y2="16" stroke="#2EC4B6" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="3" y1="19.5" x2="6.5" y2="19.5" stroke="#2EC4B6" stroke-width="0.75" stroke-linecap="round" opacity="0.25"/>

  <!-- Tech accent ticks — bottom right -->
  <line x1="55.5" y1="43" x2="61" y2="43" stroke="#2EC4B6" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="57.5" y1="47" x2="61" y2="47" stroke="#2EC4B6" stroke-width="0.75" stroke-linecap="round" opacity="0.25"/>
</svg>
